# Hexo Configuration

# Site — TODO: 改成你的信息
title: 你的博客名称
subtitle: ''
description: 嵌入式开发者 / RTOS 爱好者
keywords: RTOS, 嵌入式, 博客
author: 你的名字
language: zh-CN
timezone: Asia/Shanghai

# URL
url: https://zhiwenc125.github.io
permalink: posts/:title/
permalink_defaults:
pretty_urls:
  trailing_index: false
  trailing_html: false

# Directory
source_dir: source
public_dir: public
tag_dir: tags
archive_dir: archives
category_dir: categories
code_dir: downloads/code
i18n_dir: :lang
skip_render:
  - 'RTOS_sim/**'

# Writing
new_post_name: :title.md
default_layout: post
titlecase: false
external_link:
  enable: true
  field: site
  exclude: ''
filename_case: 0
render_drafts: false
post_asset_folder: false
relative_link: false
future: true
syntax_highlighter: highlight.js
highlight:
  line_number: false
  auto_detect: true
  tab_replace: '  '
  wrap: true
  hljs: true
prismjs:
  preprocess: true
  line_number: true
  tab_replace: ''

# Home page
index_generator:
  path: ''
  per_page: 10
  order_by: -date

# Category & Tag
default_category: uncategorized
category_map:
tag_map:

meta_generator: false

# Date format
date_format: YYYY-MM-DD
time_format: HH:mm:ss
updated_option: 'mtime'

# Pagination
per_page: 10
pagination_dir: page

include:
exclude:
ignore:

# Theme
theme: academic

# Deployment
deploy:
  type: ''
